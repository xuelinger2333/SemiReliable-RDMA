# Stage B · CloudLab real-NIC · ResNet-18 / CIFAR-10 / 2 nodes × 1 worker
#
# Derived from stage_a_baseline.yaml.  Diffs vs Stage A:
#   - dev_name:   per-node detection — c240g5: mlx5_2 on node0 / mlx5_1 on node1
#                 (asymmetric NIC slot; auto-detect via:
#                  rdma link show | awk '$3=="state" && $4=="ACTIVE" {print $2}'
#                  | cut -d/ -f1).  Earlier d7525 nodes used mlx5_0.
#   - dist.master_addr:       node1 experiment-LAN IP (set per-run)
#   - dist.world_size:  2     but one process per node (not same-host MP)
#   - chunk_bytes:      16384 — re-sweep on c240g5 CX-6 Lx 25 GbE confirmed
#                               16 KiB still the WQE-rate peak; CPU-bound
#                               ChunkSet bookkeeping makes the knee NIC-
#                               independent.  See docs/phase3/stage-b-phase2-resweep.md §2
#   - buffer_bytes:     256 MiB — bump from 128 MiB so single-bucket fits
#                                 ResNet-50 head-room for upcoming Stage B2
#   - sq_depth / rq_depth:    bumped 4× for CX-6 higher inflight
#   - timeout_ms:       5 — c240g5 2-node real-wire RQ4 sweep showed (0.95, 5ms)
#                           sweet spot, wait_p99 = 1.46 ms (vs aliyun 14.8 ms);
#                           20 ms over-provisions on real NIC.  See resweep doc §4.
#   - data.root:              ~/data/cifar10 (pre-staged on CloudLab node)
#
# Usage (on CloudLab, node0):
#   export MASTER_ADDR=$(getent hosts node1-expnet | awk '{print $1}')
#   torchrun --nnodes=2 --node_rank=0 --master_addr=$MASTER_ADDR \
#       experiments/stage_a/train_cifar10.py \
#       --config-name stage_b_cloudlab \
#       transport=semirdma loss_rate=0.0 seed=42

defaults:
  - _self_

# --- run identity ------------------------------------------------------
transport: semirdma
loss_rate: 0.0
seed: 42
steps: 500
warmup_steps: 50

# --- data --------------------------------------------------------------
data:
  root: ~/data/cifar10          # pre-staged on CloudLab, see scripts/cloudlab/setup_env.sh
  download: false               # CloudLab nodes may not have outbound HTTP
  batch_size: 128
  num_workers: 2
  pin_memory: false

# --- model -------------------------------------------------------------
model:
  name: resnet18
  num_classes: 10

# --- optimizer ---------------------------------------------------------
optim:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4

# --- distributed -------------------------------------------------------
dist:
  world_size: 2
  # Override per-run on CLI: dist.master_addr=10.10.1.1 (node0 exp-LAN IP)
  master_addr: 10.10.1.1
  master_port: 29500
  semirdma_port: 29700

# --- SemiRDMA transport (real NIC) ------------------------------------
transport_cfg:
  dev_name: mlx5_2              # c240g5 node0 default; override per-host (see header)
  gid_index: 1                  # RoCEv2 GID, verified via day0_check.sh
  buffer_bytes: 268435456       # 256 MiB per slot × n_slots=2 → 512 MiB MR
  # 2026-04-25: re-tuned on CX-5 amd203/amd196 after fixing path_mtu=1024
  # hardcode (commit 094e0cc) and discovering bursty-post loss.
  #
  # chunk_bytes=4096 == path_mtu — exactly 1 IB packet per chunk, so no
  # multi-packet PSN-gap can kill a chunk in UC.  Pre-fix (chunk=16K /
  # path_mtu=1024) gave 32% delivery; post-MTU-fix at chunk=16K still 67%
  # because each chunk was 4 IB packets and bursty post triggers ~9% per-
  # IB-packet loss on CX-5 UC.  Down to 1 packet / chunk: chunk delivery
  # ≈ 1 - per_packet_loss directly.
  #
  # sq_depth=8 — wave-throttle floor at 32 KB inflight bytes
  # (8 × 4 KB).  Larger SQ depth lets the sender post hundreds of WRs
  # back-to-back; CX-5 + UC silently drops a fraction of the resulting
  # back-to-back IB packets even on a benign direct cable (verified by
  # ib_write_bw -c UC -s 16384 hitting 24.5 Gbps line rate with 0 loss
  # while SemiRDMA at sq_depth=512 lost ~33% on the same wire).  At
  # sq_depth=8 the wave-throttle drains SEND CQEs every 7 WRs → smaller
  # NIC TX bursts → 99.55% delivery on benign wire.
  #
  # timeout_ms=200 — must exceed peer's per-bucket compute-time jitter
  # (CIFAR-10 ResNet-18 CPU forward+backward varies ~100 ms run-to-run).
  # At 50 ms we saw ~1/100 buckets time out before peer's post finished
  # → completed=0 catastrophic event.  200 ms removes the variance race.
  chunk_bytes: 4096
  sq_depth: 8
  rq_depth: 16384
  ratio: 0.95                   # Phase 2 RQ4 sweet spot, holds on real NIC
  timeout_ms: 200

# --- Hydra output layout -----------------------------------------------
hydra:
  run:
    dir: experiments/results/stage_b/${now:%Y-%m-%d}/${now:%H-%M-%S}_${transport}_loss${loss_rate}_seed${seed}
  job:
    chdir: true
